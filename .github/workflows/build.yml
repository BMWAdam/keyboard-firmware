name: Build Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Nix Flake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        # The Determinate Systems installer is the modern standard for GitHub Actions.
        # It automatically enables flakes and nix-command.
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Magic Nix Cache
        # Optional but highly recommended: caches your Nix derivations to speed up future runs.
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build firmware
        run: nix build .

      - name: Prepare Artifacts
        # actions/upload-artifact sometimes struggles with /nix/store symlinks.
        # We copy the actual files out of the 'result' symlink to a staging directory.
        run: |
          mkdir -p build-artifacts
          cp -rL result/* build-artifacts/

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: pico2w-keyboard-firmware
          path: build-artifacts/
          if-no-files-found: error
          retention-days: 90
