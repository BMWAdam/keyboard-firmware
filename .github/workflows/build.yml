name: Build Firmware and GUI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Required to allow the workflow to create a GitHub Release
permissions:
  contents: write

jobs:
  build:
    name: Build Nix Flake
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Firmware
        # Use a specific symlink name to avoid overwriting
        run: nix build . --out-link result-fw

      - name: Build GUI
        # Target the 'gui' output from your flake
        run: nix build .#gui --out-link result-gui

      - name: Prepare Artifacts
        # Copy the actual files out of both read-only Nix store symlinks
        run: |
          mkdir -p build-artifacts
          cp -rL result-fw/* build-artifacts/
          cp -rL result-gui/* build-artifacts/

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Latest Build (Firmware & GUI)
          # Automatically updates the "nightly" release with the newest files
          make_latest: true
          # Upload the raw binaries directly so they aren't zipped
          files: |
            build-artifacts/*.uf2
            build-artifacts/*.elf
            build-artifacts/*.bin
            build-artifacts/*.hex
            #build-artifacts/win.exe
            build-artifacts/linux
            #build-artifacts/linux.AppImage
